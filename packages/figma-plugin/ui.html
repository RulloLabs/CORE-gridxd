<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Inter, sans-serif; padding: 20px; background-color: #0d0d0d; color: white; display: flex; flex-direction: column; gap: 16px; margin: 0; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 14px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    button:hover { background: #2563eb; }
    button.secondary { background: #1f2937; color: #9ca3af; }
    button.secondary:hover { background: #374151; color: white; }
    .loader { display: none; text-align: center; font-size: 13px; color: #9ca3af; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>GRIDXD</h2>
  <p style="font-size: 13px; color: #9ca3af; margin-top: -10px;">Extrae iconos de tus frames en segundos con IA.</p>
  
  <div style="background: #1f2937; border-radius: 8px; padding: 12px; font-size: 12px; color: #d1d5db;">
    1. Selecciona un Frame en Figma con iconos o sprites.<br>
    2. Haz clic en "Detectar y Extraer".
  </div>

  <button id="extract">✨ Detectar y Extraer Iconos</button>
  <button id="cancel" class="secondary">Cancelar</button>

  <div id="loader" class="loader">Procesando en GridXD Cloud... ⏳</div>

  <script>
    document.getElementById('extract').onclick = () => {
      document.getElementById('loader').style.display = 'block';
      document.getElementById('extract').disabled = true;
      parent.postMessage({ pluginMessage: { type: 'extract-icons' } }, '*');
    };

    document.getElementById('cancel').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    };

    onmessage = async (event) => {
      const msg = event.data.pluginMessage;
      
      if (msg.type === 'upload-image') {
        const bytes = new Uint8Array(msg.bytes);
        const fileName = `${msg.name.replace(/ /g, '_')}.png`;
        const file = new File([bytes], fileName, { type: 'image/png' });

        const formData = new FormData();
        formData.append('file', file);
        formData.append('options', JSON.stringify({ upscale: true, removeBackground: true }));

        try {
          const response = await fetch("https://gridxd-main-production.up.railway.app/api/process", {
            method: 'POST',
            body: formData,
          });

          if (!response.ok) throw new Error("API Faltal HTTP");

          const data = await response.json();
          parent.postMessage({ pluginMessage: { type: 'extraction-success', count: data.images.length } }, '*');
        } catch (error) {
          console.error(error);
          parent.postMessage({ pluginMessage: { type: 'extraction-fail' } }, '*');
        } finally {
          document.getElementById('loader').style.display = 'none';
          document.getElementById('extract').disabled = false;
        }
      }
    };
  </script>
</body>
</html>
